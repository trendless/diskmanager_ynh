#:schema https://github.com/YunoHost/apps/raw/main/schemas/config_panel.v1.schema.json

version = "1.0"

[mount]
name.en = "Mount a Disk"

    [mount.current_disks]
    name.en = "Current Disks"
    optional = true

        [mount.current_disks.current_mounts]
        ask.en = "Active Mounts & Space"
        type = "alert"
        style = "info"

    [mount.mount_actions]
    name.en = "Mount Configurations"
    optional = true

        [mount.mount_actions.disk_uuid]
        ask.en = "Select Disk to Mount"
        type = "select"
        choices = []
        help.en = "Choose an available partition or raw drive discovered on your machine."

        [mount.mount_actions.mount_point]
        ask.en = "Mount Path"
        type = "string"
        example = "/mnt/my_external_drive"
        help.en = "The full absolute path where this disk will be mounted"

        [mount.mount_actions.yunohost_multimedia]
        ask.en = "Optimize for YunoHost Multimedia?"
        type = "boolean"
        default = false
        help.en = "Automatically adjusts permissions, ACLs, and symlinks so media apps can access files seamlessly"

[unmount]
name.en = "Unmount a Disk"

    [unmount.unmount_actions]
    name.en = "Safe Detachment"
    optional = true

        [unmount.unmount_actions.unmount_target_uuid]
        ask.en = "Select Disk to Unmount"
        type = "select"
        choices = []
        help.en = "Choose an actively managed partition to safely unmount and remove from system boot tracking"

[erase]
name.en = "Erase a Disk"

    [erase.erase_actions]
    name.en = "Factory Reset Storage"
    optional = true

        [erase.erase_actions.erase_target_node]
        ask.en = "Select Disk to Destroy"
        type = "select"
        choices = []
        help.en = "Choose a non-system disk node to wipe cleanly back to a raw factory footprint."

        [erase.erase_actions.wipe_disk_trigger]
        ask.en = "⚠️ CONFIRM PERMANENT DESTRUCTION?"
        type = "boolean"
        default = false
        help.en = "You must check this box alongside selecting a target above to authorize a complete filesystem format"